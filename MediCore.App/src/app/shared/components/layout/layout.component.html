<div class="flex flex-col min-h-screen" style="background-color: var(--bg-page);">

  <!-- Top navbar — visible on every screen size -->
  <app-navbar></app-navbar>

  <!-- Mobile-only slide-out sidebar (hidden on lg+) -->
  <app-sidebar></app-sidebar>

  <!-- Backdrop for the mobile sidebar -->
  @if (ui.mobileSidebarOpen()) {
    <button (click)="ui.closeSidebar()"
            aria-label="Close menu"
            class="fixed inset-0 z-40 bg-slate-900/40 backdrop-blur-sm lg:hidden">
    </button>
  }

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto p-4 sm:p-6">
    <div class="mx-auto max-w-screen-2xl w-full">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
